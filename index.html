<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All-in-One App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .phone{width:375px;background:#fff;border-radius:40px;overflow:hidden;border:8px solid #1a1a2e;box-shadow:0 30px 80px rgba(0,0,0,0.25);}
    .status-bar{background:#534AB7;padding:12px 20px 6px;display:flex;justify-content:space-between;align-items:center;}
    .status-bar .time{font-size:14px;font-weight:600;color:#fff;}
    .status-bar .icons{font-size:11px;color:#fff;opacity:0.9;}
    .app-header{background:#534AB7;padding:10px 18px 18px;display:flex;align-items:center;justify-content:space-between;}
    .app-title{font-size:20px;font-weight:700;color:#fff;}
    .app-sub{font-size:11px;color:#CECBF6;margin-top:2px;}
    .header-badge{background:#7F77DD;border-radius:99px;padding:5px 12px;font-size:11px;color:#EEEDFE;font-weight:600;}
    .screen{background:#f8f9ff;min-height:500px;padding:14px;}
    .nav-tabs{display:flex;background:#eef0f8;border-radius:14px;padding:3px;margin-bottom:14px;}
    .tab{flex:1;text-align:center;padding:8px 4px;border-radius:11px;font-size:11px;font-weight:600;color:#888;cursor:pointer;transition:all 0.2s;}
    .tab.active{background:#fff;color:#534AB7;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
    .section{display:none;}
    .section.active{display:block;}
    input[type=text],input[type=number],select,textarea{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid #e2e5f0;background:#fff;color:#1a1a2e;font-size:13px;outline:none;font-family:inherit;transition:border 0.2s;}
    input:focus,select:focus,textarea:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,0.12);}
    .inp{margin-bottom:8px;}
    .btn-row{display:flex;gap:6px;margin-bottom:12px;}
    .pbtn{height:40px;padding:0 16px;border-radius:12px;border:none;background:#534AB7;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
    .pbtn:hover{background:#3C3489;}
    .pbtn:active{transform:scale(0.97);}
    .ghost-btn{background:transparent;border:1.5px solid #e2e5f0;color:#534AB7;font-size:13px;font-weight:600;height:40px;padding:0 16px;border-radius:12px;cursor:pointer;transition:all 0.15s;font-family:inherit;}
    .ghost-btn:hover{border-color:#534AB7;background:#f0eeff;}
    .task-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f0f0f5;}
    .task-item:last-child{border-bottom:none;}
    .chk{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
    .chk.done{background:#534AB7;border-color:#534AB7;}
    .chk svg{display:none;}
    .chk.done svg{display:block;}
    .ttext{flex:1;font-size:14px;color:#1a1a2e;cursor:pointer;line-height:1.3;}
    .ttext.done{text-decoration:line-through;color:#aaa;}
    .ttag{font-size:10px;padding:3px 8px;border-radius:99px;font-weight:600;flex-shrink:0;}
    .ttag.work{background:#EEEDFE;color:#3C3489;}
    .ttag.personal{background:#E1F5EE;color:#085041;}
    .ttag.urgent{background:#FCEBEB;color:#791F1F;}
    .xbtn{width:26px;height:26px;border:none;background:transparent;cursor:pointer;color:#bbb;font-size:18px;line-height:1;flex-shrink:0;}
    .xbtn:hover{color:#E24B4A;}
    .metric-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
    .metric{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #eee;}
    .metric-l{font-size:11px;color:#888;margin-bottom:3px;font-weight:500;}
    .metric-v{font-size:20px;font-weight:700;color:#1a1a2e;}
    .bar-wrap{margin-bottom:12px;}
    .bar-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:5px;font-weight:500;}
    .bar-track{height:7px;background:#eef0f8;border-radius:99px;overflow:hidden;}
    .bar-fill{height:100%;background:#534AB7;border-radius:99px;transition:width 0.4s;}
    .exp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f5;}
    .exp-row:last-child{border-bottom:none;}
    .ecat{font-size:10px;padding:3px 7px;border-radius:99px;font-weight:600;margin-top:3px;display:inline-block;}
    .ecat.food{background:#FAEEDA;color:#633806;}
    .ecat.transport{background:#E6F1FB;color:#0C447C;}
    .ecat.bills{background:#EAF3DE;color:#27500A;}
    .ecat.shopping{background:#FBEAF0;color:#72243E;}
    .ecat.other{background:#f1f1f1;color:#555;}
    .note-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #eee;position:relative;}
    .note-t{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:4px;}
    .note-b{font-size:12px;color:#888;line-height:1.5;}
    .note-x{position:absolute;top:10px;right:10px;background:transparent;border:none;cursor:pointer;color:#ccc;font-size:16px;}
    .note-x:hover{color:#E24B4A;}
    .game-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
    .gcard{aspect-ratio:1;border-radius:10px;border:1.5px solid #e2e5f0;background:#f4f5ff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all 0.15s;user-select:none;}
    .gcard:hover{background:#eee;}
    .gcard.revealed{background:#EEEDFE;border-color:#AFA9EC;}
    .gcard.matched{background:#E1F5EE;border-color:#9FE1CB;cursor:default;}
    .gstats{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:10px;font-weight:500;}
    .gstats b{color:#1a1a2e;}
    .win-box{text-align:center;background:#E1F5EE;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid #9FE1CB;}
    .win-box p{font-size:15px;font-weight:700;color:#085041;margin-bottom:10px;}
    .empty{text-align:center;padding:2rem 0;font-size:13px;color:#bbb;}
    .bot-nav{background:#fff;border-top:1px solid #f0f0f5;display:flex;padding:10px 0 14px;}
    .bnav{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
    .bnav-icon{font-size:20px;opacity:0.35;transition:all 0.15s;}
    .bnav-label{font-size:10px;color:#bbb;font-weight:500;transition:all 0.15s;}
    .bnav.active .bnav-icon{opacity:1;}
    .bnav.active .bnav-label{color:#534AB7;}
    textarea.inp{height:72px;resize:none;line-height:1.5;}
    select.sel{height:40px;margin:0;}
    .section-title{font-size:13px;font-weight:700;color:#534AB7;margin-bottom:8px;letter-spacing:0.3px;}
  </style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span class="time" id="clock">9:41</span>
    <span class="icons">▲▲▲ WiFi ■</span>
  </div>
  <div class="app-header">
    <div>
      <div class="app-title">My App</div>
      <div class="app-sub">Productivity · Finance · Fun</div>
    </div>
    <div class="header-badge">4 tools</div>
  </div>

  <div class="screen">
    <div class="nav-tabs">
      <div class="tab active" onclick="switchTab('tasks',0,this)">Tasks</div>
      <div class="tab" onclick="switchTab('notes',1,this)">Notes</div>
      <div class="tab" onclick="switchTab('budget',2,this)">Budget</div>
      <div class="tab" onclick="switchTab('game',3,this)">Game</div>
    </div>

    <!-- TASKS -->
    <div id="tasks" class="section active">
      <input class="inp" id="t-in" type="text" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addTask()"/>
      <div class="btn-row">
        <select class="sel inp" id="t-tag" style="flex:1;margin:0;">
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="urgent">Urgent</option>
        </select>
        <button class="pbtn" onclick="addTask()">+ Add</button>
      </div>
      <div id="tlist"></div>
      <div id="tempty" class="empty">No tasks yet. Add one above!</div>
    </div>

    <!-- NOTES -->
    <div id="notes" class="section">
      <input class="inp" id="n-title" type="text" placeholder="Note title..."/>
      <textarea class="inp" id="n-body" placeholder="Write your note here..."></textarea>
      <div style="text-align:right;margin-bottom:12px;">
        <button class="pbtn" onclick="addNote()">Save Note</button>
      </div>
      <div id="nlist"></div>
      <div id="nempty" class="empty">No notes saved yet.</div>
    </div>

    <!-- BUDGET -->
    <div id="budget" class="section">
      <div class="metric-row">
        <div class="metric"><div class="metric-l">Income</div><div class="metric-v" id="b-in">₹0</div></div>
        <div class="metric"><div class="metric-l">Spent</div><div class="metric-v" id="b-sp">₹0</div></div>
        <div class="metric" style="grid-column:span 2;">
          <div class="metric-l">Balance</div>
          <div class="metric-v" id="b-bal">₹0</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>Spending rate</span><span id="bpct">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="bbar" style="width:0%"></div></div>
      </div>
      <input class="inp" id="e-name" type="text" placeholder="Description (e.g. Lunch, Salary)"/>
      <div class="btn-row">
        <input type="number" id="e-amt" placeholder="Amount" style="flex:1;height:40px;border-radius:12px;border:1.5px solid #e2e5f0;padding:0 12px;font-size:13px;outline:none;"/>
        <select class="sel" id="e-cat" style="width:100px;">
          <option value="food">Food</option>
          <option value="transport">Transport</option>
          <option value="bills">Bills</option>
          <option value="shopping">Shopping</option>
          <option value="other">Other</option>
        </select>
        <select class="sel" id="e-type" style="width:72px;">
          <option value="expense">Exp</option>
          <option value="income">Inc</option>
        </select>
        <button class="pbtn" onclick="addExp()">Add</button>
      </div>
      <div id="elist"></div>
      <div id="eempty" class="empty">No transactions yet.</div>
    </div>

    <!-- GAME -->
    <div id="game" class="section">
      <div class="gstats">Moves: <b id="gm">0</b> &nbsp; Matches: <b id="gmat">0</b>/8</div>
      <div id="gwin" class="win-box" style="display:none;">
        <p>You won!</p>
        <button class="pbtn" onclick="initGame()">Play Again</button>
      </div>
      <div class="game-grid" id="gboard"></div>
      <button class="ghost-btn" style="width:100%;" onclick="initGame()">Reset Game</button>
    </div>
  </div>

  <div class="bot-nav">
    <div class="bnav active" id="bn0" onclick="switchTab('tasks',0,document.querySelectorAll('.tab')[0])">
      <div class="bnav-icon">☑</div>
      <div class="bnav-label">Tasks</div>
    </div>
    <div class="bnav" id="bn1" onclick="switchTab('notes',1,document.querySelectorAll('.tab')[1])">
      <div class="bnav-icon">📝</div>
      <div class="bnav-label">Notes</div>
    </div>
    <div class="bnav" id="bn2" onclick="switchTab('budget',2,document.querySelectorAll('.tab')[2])">
      <div class="bnav-icon">₹</div>
      <div class="bnav-label">Budget</div>
    </div>
    <div class="bnav" id="bn3" onclick="switchTab('game',3,document.querySelectorAll('.tab')[3])">
      <div class="bnav-icon">🎮</div>
      <div class="bnav-label">Game</div>
    </div>
  </div>
</div>

<script>
  // Live clock
  function updateClock(){
    var now=new Date(),h=now.getHours(),m=now.getMinutes();
    document.getElementById('clock').textContent=(h%12||12)+':'+(m<10?'0':'')+m+(h<12?' AM':' PM');
  }
  updateClock();setInterval(updateClock,10000);

  // Tab switching
  function switchTab(id,idx,tabEl){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.bnav').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(tabEl)tabEl.classList.add('active');
    document.getElementById('bn'+idx).classList.add('active');
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // ── TASKS ──────────────────────────────────────
  var tasks=[
    {text:'Finish project report',tag:'work',done:false},
    {text:'Buy groceries',tag:'personal',done:false},
    {text:'Pay electricity bill',tag:'urgent',done:true}
  ];
  function addTask(){
    var v=document.getElementById('t-in').value.trim();
    if(!v)return;
    tasks.unshift({text:v,tag:document.getElementById('t-tag').value,done:false});
    document.getElementById('t-in').value='';
    renderTasks();
  }
  function toggleTask(i){tasks[i].done=!tasks[i].done;renderTasks();}
  function delTask(i){tasks.splice(i,1);renderTasks();}
  function renderTasks(){
    var el=document.getElementById('tlist'),em=document.getElementById('tempty');
    el.innerHTML='';
    em.style.display=tasks.length?'none':'block';
    tasks.forEach(function(t,i){
      var d=document.createElement('div');d.className='task-item';
      d.innerHTML='<div class="chk'+(t.done?' done':'')+'" onclick="toggleTask('+i+')">'
        +'<svg width="11" height="11" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        +'</div><span class="ttext'+(t.done?' done':'')+'" onclick="toggleTask('+i+')">'+esc(t.text)+'</span>'
        +'<span class="ttag '+t.tag+'">'+t.tag+'</span>'
        +'<button class="xbtn" onclick="delTask('+i+')">×</button>';
      el.appendChild(d);
    });
  }
  renderTasks();

  // ── NOTES ──────────────────────────────────────
  var notes=[
    {title:'Meeting notes',body:'Discussed Q2 targets and roadmap. Follow up with team by Friday.'},
    {title:'App ideas',body:'New feature: dark mode toggle, export to PDF, cloud sync.'}
  ];
  function addNote(){
    var t=document.getElementById('n-title').value.trim(),b=document.getElementById('n-body').value.trim();
    if(!t&&!b)return;
    notes.unshift({title:t||'Untitled',body:b});
    document.getElementById('n-title').value='';
    document.getElementById('n-body').value='';
    renderNotes();
  }
  function delNote(i){notes.splice(i,1);renderNotes();}
  function renderNotes(){
    var el=document.getElementById('nlist'),em=document.getElementById('nempty');
    el.innerHTML='';
    em.style.display=notes.length?'none':'block';
    notes.forEach(function(n,i){
      var d=document.createElement('div');d.className='note-card';
      d.innerHTML='<button class="note-x" onclick="delNote('+i+')">×</button>'
        +'<div class="note-t">'+esc(n.title)+'</div>'
        +'<div class="note-b">'+esc(n.body)+'</div>';
      el.appendChild(d);
    });
  }
  renderNotes();

  // ── BUDGET ─────────────────────────────────────
  var exps=[
    {name:'Salary',amt:50000,cat:'other',type:'income'},
    {name:'Rent',amt:12000,cat:'bills',type:'expense'},
    {name:'Groceries',amt:3500,cat:'food',type:'expense'},
    {name:'Auto rickshaw',amt:800,cat:'transport',type:'expense'}
  ];
  function addExp(){
    var n=document.getElementById('e-name').value.trim(),a=parseFloat(document.getElementById('e-amt').value);
    if(!n||!a||a<=0)return;
    exps.unshift({name:n,amt:a,cat:document.getElementById('e-cat').value,type:document.getElementById('e-type').value});
    document.getElementById('e-name').value='';
    document.getElementById('e-amt').value='';
    renderBudget();
  }
  function delExp(i){exps.splice(i,1);renderBudget();}
  function renderBudget(){
    var inc=0,sp=0;
    exps.forEach(function(e){if(e.type==='income')inc+=e.amt;else sp+=e.amt;});
    var bal=inc-sp;
    document.getElementById('b-in').textContent='₹'+inc.toLocaleString('en-IN');
    document.getElementById('b-sp').textContent='₹'+sp.toLocaleString('en-IN');
    var bel=document.getElementById('b-bal');
    bel.textContent='₹'+Math.abs(bal).toLocaleString('en-IN')+(bal<0?' (deficit)':'');
    bel.style.color=bal>=0?'#10B981':'#E24B4A';
    var pct=inc>0?Math.min(100,Math.round(sp/inc*100)):0;
    document.getElementById('bpct').textContent=pct+'%';
    var bf=document.getElementById('bbar');
    bf.style.width=pct+'%';
    bf.style.background=pct>80?'#E24B4A':'#534AB7';
    var el=document.getElementById('elist'),em=document.getElementById('eempty');
    el.innerHTML='';
    em.style.display=exps.length?'none':'block';
    exps.forEach(function(e,i){
      var d=document.createElement('div');d.className='exp-row';
      var sign=e.type==='income'?'+':'-';
      var col=e.type==='income'?'#10B981':'#E24B4A';
      d.innerHTML='<div><div style="font-size:13px;color:#1a1a2e;font-weight:500;">'+esc(e.name)+'</div>'
        +'<span class="ecat '+e.cat+'">'+e.cat+'</span></div>'
        +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<span style="font-size:13px;font-weight:700;color:'+col+';">'+sign+'₹'+e.amt.toLocaleString('en-IN')+'</span>'
        +'<button class="xbtn" onclick="delExp('+i+')">×</button></div>';
      el.appendChild(d);
    });
  }
  renderBudget();

  // ── MEMORY GAME ────────────────────────────────
  var syms=['A','B','C','D','E','F','G','H'];
  var smap={A:'★',B:'♦',C:'●',D:'▲',E:'◆',F:'■',G:'▶',H:'◀'};
  var gc=[],gf=[],gm=[],gmoves=0,glock=false;
  function initGame(){
    var deck=syms.concat(syms).sort(()=>Math.random()-0.5);
    gc=deck;gf=[];gm=[];gmoves=0;glock=false;
    document.getElementById('gwin').style.display='none';
    document.getElementById('gm').textContent='0';
    document.getElementById('gmat').textContent='0';
    renderGame();
  }
  function flipG(i){
    if(glock||gf.indexOf(i)>=0||gm.indexOf(i)>=0)return;
    gf.push(i);renderGame();
    if(gf.length===2){
      gmoves++;document.getElementById('gm').textContent=gmoves;
      glock=true;
      setTimeout(function(){
        if(gc[gf[0]]===gc[gf[1]]){gm.push(gf[0],gf[1]);document.getElementById('gmat').textContent=Math.round(gm.length/2);}
        gf=[];glock=false;renderGame();
        if(gm.length===16)document.getElementById('gwin').style.display='block';
      },650);
    }
  }
  function renderGame(){
    var b=document.getElementById('gboard');b.innerHTML='';
    gc.forEach(function(c,i){
      var div=document.createElement('div');
      var isF=gf.indexOf(i)>=0,isM=gm.indexOf(i)>=0;
      div.className='gcard'+(isF?' revealed':'')+(isM?' matched':'');
      div.textContent=(isF||isM)?smap[c]:'?';
      div.onclick=function(){flipG(i);};
      b.appendChild(div);
    });
  }
  initGame();
</script>
</body>
</html>
